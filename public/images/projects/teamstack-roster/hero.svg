<svg width="2100" height="900" viewBox="0 0 2100 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TeamStack Roster hero art</title>
  <desc id="desc">Bold layered gradient background evoking roster coordination</desc>
  <defs>
    <linearGradient id="roster-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#190933" />
      <stop offset="40%" stop-color="#3E1F47" />
      <stop offset="100%" stop-color="#8A2387" />
    </linearGradient>
    <linearGradient id="roster-stripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F27121" />
      <stop offset="50%" stop-color="#E94057" />
      <stop offset="100%" stop-color="#8A2387" />
    </linearGradient>
  </defs>
  <rect width="2100" height="900" fill="url(#roster-bg)" />
  <g opacity="0.65">
    <rect x="-200" y="180" width="2500" height="140" fill="url(#roster-stripe)" transform="rotate(-6 1050 450)" />
    <rect x="-150" y="360" width="2400" height="140" fill="url(#roster-stripe)" transform="rotate(-6 1050 450)" opacity="0.6" />
    <rect x="-100" y="540" width="2300" height="140" fill="url(#roster-stripe)" transform="rotate(-6 1050 450)" opacity="0.4" />
  </g>
  <text x="1050" y="430" fill="#FFFFFF" text-anchor="middle" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="92" font-weight="600" letter-spacing="5">
    TEAMSTACK ROSTER
  </text>
  <text x="1050" y="520" fill="#FFECD1" text-anchor="middle" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="36" letter-spacing="8">
    HIGH-PERFORMANCE TEAM OPS
  </text>
</svg>
