<svg width="2100" height="900" viewBox="0 0 2100 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">The Air Product hero art</title>
  <desc id="desc">Abstract gradient background with concentric circles for The Air Product project</desc>
  <defs>
    <linearGradient id="gap-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A" />
      <stop offset="50%" stop-color="#1B4965" />
      <stop offset="100%" stop-color="#247BA0" />
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#88D4D8" stop-opacity="0.45" />
      <stop offset="60%" stop-color="#247BA0" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="2100" height="900" fill="url(#gap-gradient)" />
  <circle cx="1050" cy="450" r="600" fill="url(#pulse)" />
  <circle cx="1050" cy="450" r="350" fill="none" stroke="#88D4D8" stroke-opacity="0.4" stroke-width="4" />
  <circle cx="1050" cy="450" r="520" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="14 18" />
  <text x="1050" y="420" fill="#ffffff" text-anchor="middle" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="600" letter-spacing="4">
    THE AIR PRODUCT
  </text>
  <text x="1050" y="510" fill="#D4F1F4" text-anchor="middle" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="34" letter-spacing="6">
    AI-FIRST STRATEGIC PLATFORM
  </text>
</svg>
